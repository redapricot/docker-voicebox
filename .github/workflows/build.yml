name: Build voicebox CPU image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Get latest upstream release tag
        id: upstream
        run: |
          TAG=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/jamiepine/voicebox/releases/latest \
            | jq -r '.tag_name')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Upstream latest release: $TAG"

      - name: Get last built tag
        id: last
        run: |
          LAST=$(cat .last-built-tag 2>/dev/null || echo "none")
          echo "tag=$LAST" >> $GITHUB_OUTPUT
          echo "Last built: $LAST"

      - name: Check if build is needed
        id: should_build
        run: |
          if [ "${{ steps.upstream.outputs.tag }}" = "${{ steps.last.outputs.tag }}" ]; then
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "Already built ${{ steps.upstream.outputs.tag }}, nothing to do."
          else
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "New tag detected: ${{ steps.upstream.outputs.tag }} (was: ${{ steps.last.outputs.tag }})"
          fi

      - name: Clone upstream at tag
        if: steps.should_build.outputs.needed == 'true'
        run: |
          git clone --depth 1 \
            --branch ${{ steps.upstream.outputs.tag }} \
            https://github.com/jamiepine/voicebox.git upstream

      - name: Set up Docker Buildx
        if: steps.should_build.outputs.needed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Set lower case owner name
        if: steps.should_build.outputs.needed == 'true'
        run: |
          echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        if: steps.should_build.outputs.needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CPU image
        if: steps.should_build.outputs.needed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./upstream
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/docker-voicebox:${{ steps.upstream.outputs.tag }}
            ghcr.io/${{ env.OWNER_LC }}/docker-voicebox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save built tag
        if: steps.should_build.outputs.needed == 'true'
        run: |
          echo "${{ steps.upstream.outputs.tag }}" > .last-built-tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-built-tag
          git commit -m "chore: built ${{ steps.upstream.outputs.tag }}"
          git push